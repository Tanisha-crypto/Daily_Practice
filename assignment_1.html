<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
       }

       body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #eef6fb;
        font-family: Arial, sans-serif;
       }

       .container {
        position: relative;
        width: 340px;
        padding: 28px 24px;
        background-color: #ffffff;
        border: 1px solid #d9e3ef;
        border-radius: 28px;
        box-shadow: 0 18px 40px rgba(38, 78, 121, 0.12);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
       }

       .head-view {
        position: absolute;
        top: 18px;
        right: 18px;
       }

       .head-view button {
        padding: 8px 16px;
        border: none;
        border-radius: 999px;
        background-color: #f2f9ff;
        color: #3a5d7d;
        font-weight: 700;
       }

       .image-view img {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        object-fit: cover;
        border: 5px solid #ffffff;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
       }

       .hero-view h2 {
        font-size: 26px;
        margin-bottom: 6px;
        text-align: center;
       }

       .para-view p {
        text-align: center;
        color: #000000;
        line-height: 1.6;
        font-size: 14px;
        padding: 0 6px;
       }

       .footer {
        display: flex;
        gap: 16px;
        width: 100%;
        justify-content: center;
        margin-top: 10px;
       }

       .footer button {
        padding: 10px 22px;
        border-radius: 12px;
       }

       .footer button.follow {
        background-color: #1a73e8;
        color: #ffffff;
        border-color: transparent;
       }

       .footer button.submit {
        background-color: #f8fafc;
        color: #1f3b5a;
       }
     
    </style>
</head>
<body>
    <div class="container">

    <div class="head-view">
        <button>VERIFIED</button>
    </div>

    <div class="image-view">
        <img src="https://i.pravatar.cc/200" alt="">
    </div>

    <div class="hero-view">
        <h2>John Alison</h2>
        <h4>Frontend Developer</h4>
    </div>

    <div class="para-view">
        <p>
            Passionate Frontend Developer with experience in
            building responsive and user-friendly web applications.
        </p>
    </div>

    <div class="footer">
        <button class="follow">Follow</button>
        <button class="submit">Submit</button>
    </div>

</div>
</body>
</html>
