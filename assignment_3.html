<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Flexbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background: #f2f2f2;
            color: #111;
            min-height: 100vh;
        }

        header {
            background: #000;
            color: #fff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .hero {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #f5f5f5;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: #555;
            margin-bottom: 1.75rem;
        }

        ul {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        li {
            color: #ccc;
        }

        button{
            height: 30px;
            width:50px;
            background-color:rgb(237, 245, 245)
        }

    </style>
</head>
<body>
    <header>
        <div class="logo">LOGO</div>
        <nav>
            <ul class="List">
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </nav>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Learn Flexbox</h1>
            <p class="hero-subtitle">Arrange elements easily</p>
            <button>Start</button>
        </div>
    </main>
</body>
</html>
