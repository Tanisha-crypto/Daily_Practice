<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #98b0e0;
            font-family:Arial, Helvetica, sans-serif
        }

        .cards {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 240px;
            min-height: 220px;
            padding: 26px 20px;
            background-color: #ffffff;
            border: 3px solid #240b11;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-align: center;
        }

        .card h3 {
            font-size: 25px;
            color: #000000;
        }

        .card .price {
            font-size: 30px;
            font-weight: 700;
            color: #101827;
        }

        .card button {
            width: 100px;
            padding: 10px ;
            border: 1px solid #0b0b0b;
            border-radius: 5px;
            background-color: #f8fafc;
            color: #000000;
            cursor: pointer;
            font-weight: 600;
        }

    </style>
</head>
<body>
    <div class="cards">
        <div class="card">
            <h3>Basic</h3>
            <div class="price">₹499</div>
            <button>Buy</button>
        </div>

        <div class="card">
            <h3>Pro</h3>
            <div class="price">₹999</div>
            <button>Buy</button>
        </div>

        <div class="card">
            <h3>Gold</h3>
            <div class="price">₹1499</div>
            <button>Buy</button>
        </div>
    </div>
</body>
</html>
