<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{
    background:#b3b9c7;
}

.container{
    height:90vh;
    width:350px;
    margin:40px auto;
    background:#ffffff;
    border-radius:20px;
    border:1px solid rgb(1, 85, 112);
    padding:25px;
}

.head-view{
    text-align:right;
}

.head-view button{
    background:#28ae60;
    color:white;
    border:none;
    border-radius:20px;
    padding:10px 18px;
}

.image-view{
    text-align:center;
    margin-top:20px;
}

.image-view img{
    width:150px;
    border-radius:50%;
    border:4px solid blue;
}

.hero-view{
    text-align:center;
    margin-top:25px;
}

.hero-view h2{
    margin-bottom:10px;
}

.skills-view,
.bottom-skill{
    text-align:center;
    margin-top:20px;
}

.skills-view div,
.bottom-skill div{
    display:inline-block;
    background:#ecf1ff;
    border:1px solid lightblue;
    border-radius:20px;
    padding:10px 15px;
    margin:5px;
}

.para-view{
    text-align:center;
    margin-top:25px;
}

.para-view p{
    font-size:15px;
}

.footer{
    text-align:center;
    margin-top:30px;
}

.follow{
    background:#4a67ff;
    color:white;
    border:none;
    border-radius:20px;
    padding:12px 28px;
    font-size:15px;
    margin-right:10px;
}

.submit{
    background:#f3f4ff;
    color:blue;
    border:1px solid blue;
    border-radius:20px;
    padding:12px 28px;
    font-size:15px;
}
</style>

</head>
<body>

<div class="container">

    <div class="head-view">
        <button>VERIFIED</button>
    </div>

    <div class="image-view">
        <img src="https://i.pravatar.cc/200" alt="">
    </div>

    <div class="hero-view">
        <h2>Baddy Om</h2>
        <h4>Frontend Developer</h4>
    </div>

    <div class="skills-view">
        <div>HTML</div>
        <div>CSS</div>
        <div>JavaScript</div>
    </div>

    <div class="bottom-skill">
        <div>React</div>
        <div>UI/UX</div>
    </div>

    <div class="para-view">
        <p>
            Passionate Frontend Developer with experience in
            building responsive and user-friendly web applications.
        </p>
    </div>

    <div class="footer">
        <button class="follow">Follow</button>
        <button class="submit">Submit</button>
    </div>

</div>

</body>
</html>
