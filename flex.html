<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0px;
            padding:2px;
            box-sizing: border-box;
        }
        .container{
            height:100vh;
            width:100vw;
            border:green 10px solid;
            display:flex;
            flex-wrap: wrap;
            gap: 3px;
        }
        .box{
            border:solid 3px;
            background-color: rgb(207, 20, 23);
            height:100px;
            width: 200px;
            flex-shrink:0;
        }
        .box1{
            flex-grow:1;
            order: 1;
            color: aliceblue;
        }
        .box2{
            flex-grow: 2;
            order: 2;
            color:beige;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="box box1">Box_1</div>

        <div class="box box2">Box_2</div>

        <div class="box">Box_3</div>
        
        <div class="box">Box_4</div>

    </div>
</body>
</html>
