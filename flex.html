<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        *{
            margin:0px;
            padding:2px;
            box-sizing: border-box;
        }
        .container{
            border:solid green 5px;
            height:100vh;
            display:flex;
            gap:6px;
            justify-content: center;
            align-items: center;
            
        }
        .box{
            background-color: rgb(236, 109, 41);
            height:100px;
            width: 200px;
            border:3px solid;
        }
       
    </style>
</head>
<body>
    <div class="container">

        <div class="box">1</div>

        <div class="box">2</div>

        <div class="box">3</div>
        
        <div class="box">4</div>

        <div class="box">5</div>

    </div>
</body>
</html>
