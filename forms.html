<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee</title>
</head>
<body>
    <link rel="stylesheet" href="forms.css">
    <div class="card">
         <h1>Employee Data</h1>
    <br>
    <div>
        <div>
            <!-- Name Section -->
        <label for = "name"> Name </label>
        <input type = "text" 
            id = "name" 
            name = "name" 
            placeholder = "Enter your name" 
            required>
        </div>
    </div>
    <br>
    <div>
        <!-- Bio Section -->
        <label for = "Professional Bio"> Bio</label>
        <input type ="text"
            id ="bio"
            name="bio"
            placeholder="Enter your Bio"
            required>
    </div>
    <br>
    <div>
        <!-- Email Section -->
        <label for="Email">Email</label>
        <input type="text"
            id="Email"
            name="email"
            placeholder="abc@gmail.com"
            required>
    </div>
    <br>
    <div>  
        <!-- Gender Section      -->
        <label for = "gender"> Gender </label>     
        <select name = "gender" id = "gender" required>
            <option value = "male"> Male </option>
            <option value = "female"> Female </option>
        </select>
    </div>
    <br>
    <div>
        <!-- Role Section -->
        <p> Select Role </p>
        <input type = "radio" name="rad" id="Tech">
        <label for = "Tech"> Tech </label>
        <input type = "radio" name="rad" id="Non-Tech">
        <label for = "Non-Tech"> Non-Tech </label>
    </div>
    <br>
    <div>
        <!-- Salary -->
         <label for="Salary">Salary</label>
         <input type="number"
         id="Salary"
         name="number"
         required>
    </div>
    <br>
    <div>
        <!-- Date of birth -->
        <label for="DOB">Date of Birth</label>
        <input type="datetime-local"
            id="Date of Birth"
            name="datetime-local"
            required>
    </div>
    </div>
    <br>  
</body>
</html>
